{% extends './base.html' %}

{% block title%}
Login
{% endblock title%}


{% block content %}
<div class="containerino">

  <a href={% url "password_reset" %}>Forgot Password?</a>

  {% if messages %}
  <ul class="messages">
    {% for message in messages %}       
        <li {% if message.tags %} class=" {{ message.tags }} " {% endif %}> {{ message }} </li>
    {% endfor %}
  </ul>
  {% endif %}
  

  <form action={% url "login" %} class="login-form" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-containerino">
      <div class="login-header">
        <h2> <i class="bi bi-person-circle"></i> Login</h2>
      </div>
      {{form.as_p}}
      <p>
        <button type="submit" class="btn btn-block btn-primary login-button">Login</button>
      </p>
    </div>
    
    </form>
</div>
{% endblock content %}
