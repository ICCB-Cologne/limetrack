{% extends "admin/index.html" %}

{% block sidebar %}
    {{ block.super }}
    <div class="app-auth module">
      <table style="width: 100%;">
        <caption>User Bulk Operations</caption>
        <tbody>
          <tr>
            <td>
              <input accept=".csv" type="file" id="users-file" name="users-file-input"/>
            </td>
            <td style="vertical-align: middle;">
              <a class="addlink" onclick="uploadUsers()">Add</a>   
            </td>
            <td style="vertical-align: middle;">
              <a class="changelink">Change</a>
            </td>
            <td style="vertical-align: middle;">
              <a class="deletelink">Delete</a>
            </td>
          </tr>
      </tbody>
    </table>
    <table style="width: 100%">
      <caption>Results</caption>
      <tbody id="results-tbody"></tbody>
  </table>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"
  integrity="sha384-ZvpUoO/+PpLXR1lu4jmpXWu80pZlYUAfxl5NsBMWOEPSjUn/6Z/hRTt8+pR6L4N2"
  crossorigin="anonymous"></script>
  <script>
    function renderResults(response_json) {
      let tbody = $("#results-tbody");

      for (created of response_json["created"]) {
        let $result = $(`
          <tr>
            <td>
              <div style="white-space: wrap;" class="addlink">Created: ${created}</div>
            </td>
          </tr>`
        );
        $result.delay(5000).fadeOut(500);
        tbody.append($result);
      }

      for (error of response_json["errors"]) {
        let $result = $(`
          <tr>
            <td>
              <div style="white-space: wrap;" class="deletelink">${error["name"]}: ${error["description"]}</div>
            </td>
          </tr>`
        );
        tbody.append($result);
      }
    }

    async function uploadUsers() {
      let file_input = document.getElementById("users-file");
      let file = file_input.files[0];
      let content = "";
      let csrf_token = document.getElementsByName('csrfmiddlewaretoken')[0].value
      let data = await file.text().then(t => content = t);

      let request = $.ajax({
        type: "POST",
        url: "/users/users_bulk/",
        data: {
          csrfmiddlewaretoken: csrf_token,
          data: content
        },
        dataType: "json", 
        success: (data) => {
          renderResults(data);
        }

      });
    }
  </script>
{% endblock %}
