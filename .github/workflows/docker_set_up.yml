name: Docker Image CI
run-name: run docker compose

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Docker Compose
      run: docker compose -f docker-compose.yml -f docker-compose-develop.yml up --remove-orphans --force-recreate